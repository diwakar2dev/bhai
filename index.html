<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AachmanPlayz - Official</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{background:#000;color:white;overflow-x:hidden}

    #particles-js{position:fixed;width:100%;height:100%;z-index:-1}

    nav{display:flex;justify-content:space-between;padding:20px 60px;position:fixed;width:100%;backdrop-filter:blur(10px);z-index:10}

    nav h1{
      background:linear-gradient(90deg, red, cyan);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 20px cyan;
    }

    .hero{height:100vh;display:flex;justify-content:center;align-items:center}

    .card{
      width:350px;height:420px;background:rgba(255,255,255,0.05);
      border-radius:20px;backdrop-filter:blur(20px);
      box-shadow:0 0 40px rgba(0,255,255,0.3);
      transition:0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;
    }

    .card:hover{box-shadow:0 0 80px cyan}

    .card img{
      width:120px;border-radius:50%;border:3px solid cyan;
      box-shadow:0 0 25px cyan;transition:0.3s;
    }

    .card img:hover{transform:scale(1.1);box-shadow:0 0 40px red}

    .btn{
      margin-top:10px;padding:10px 20px;border:none;border-radius:25px;cursor:pointer;
      background:linear-gradient(90deg, red, cyan);color:white;transition:0.3s;box-shadow:0 0 15px cyan;
    }

    .btn:hover{transform:scale(1.1);box-shadow:0 0 30px red}

    .section{padding:80px 20px;text-align:center}

    iframe{border-radius:15px;margin-top:20px}

    #subs{margin-top:10px;font-size:18px;color:cyan;text-shadow:0 0 10px cyan}

  </style>
</head>
<body>

<div id="particles-js"></div>

<nav>
  <h1>AachmanPlayz</h1>
</nav>

<section class="hero">
  <div class="card" id="tilt">
    <img src="yt.png">
    <h2>AachmanPlayz</h2>
    <p id="subs">Loading subscribers...</p>
    <a href="https://www.youtube.com/@Aachmanplayz/featured" target="_blank">
      <button class="btn">YouTube</button>
    </a>
    <a href="https://discord.gg/m2SbasDEe" target="_blank">
      <button class="btn">Discord</button>
    </a>
  </div>
</section>

<section class="section">
  <h2>Latest Video</h2>
  <iframe width="560" height="315" src="https://www.youtube.com/embed?listType=user_uploads&list=Aachmanplayz" allowfullscreen></iframe>
</section>

<script>

// 3D Tilt
const card = document.getElementById('tilt');
document.addEventListener('mousemove', (e) => {
  let x = (window.innerWidth / 2 - e.pageX) / 25;
  let y = (window.innerHeight / 2 - e.pageY) / 25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// Particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 2 }
  }
});

// LIVE SUBSCRIBER COUNT (replace CHANNEL_ID)
const channelId = "UCbcKxehV9H7gOQilUuzu-ew"; // <-- PUT YOUR REAL CHANNEL ID

async function getSubs(){
  try{
    let res = await fetch(`https://api.socialcounts.org/youtube-live-subscriber-count/${channelId}`);
    let data = await res.json();
    document.getElementById('subs').innerText = data.est_sub + " Subscribers";
  }catch{
    document.getElementById('subs').innerText = "Unable to load subs";
  }
}

getSubs();
setInterval(getSubs, 5000);

</script>

</body>
</html>
